# ==========================================
# CNB 构建配置文件
# 项目：edge-ai-gateway
# 作用：主分支推送时同步镜像到 GitHub 仓库
# 参考自：XMZZUZHI/womenhealth-app-kaifa/-/blob/main/.cnb.yml
# ==========================================

# ------------------------------------------
# 主分支同步到 GitHub 仓库（仅 main 分支 push 触发）
# 凭据由 XMZZUZHI/key 仓库的 Github.yml 注入：
#   GIT_USERNAME / GIT_ACCESS_TOKEN / GIT_EMAIL
# ------------------------------------------
main:
  push:
    - name: sync-to-github
      services:
        - docker
      imports:
        - https://cnb.cool/XMZZUZHI/key/-/blob/main/Github.yml
      stages:
        - name: 同步到GitHub
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/xiaomizhoubaobei/edge-ai-gateway.git
            auth_type: https
            username: ${GIT_USERNAME}
            password: ${GIT_ACCESS_TOKEN}
            branch: main
            git_user: ${GIT_USERNAME}
            git_email: ${GIT_EMAIL}
            force: true
